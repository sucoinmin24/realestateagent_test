<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="공인중개사">
    <meta name="theme-color" content="#667eea">
    <title>공인중개사 시험 문제집</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 8px;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            background: white;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .content {
            padding: 40px;
        }

        .start-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .start-screen h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        .start-screen p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .select-group {
            margin: 25px 0;
            text-align: left;
        }

        .select-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }

        .select-group select,
        .select-group input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .select-group select:focus,
        .select-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .select-group input {
            cursor: text;
        }

        #questionCountInput {
            display: none;
            margin-top: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .menu-btn:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .menu-btn:active {
            transform: translateY(0);
        }

        .menu-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .menu-label {
            font-size: 17px;
            font-weight: bold;
            color: #333;
            display: block;
        }

        .menu-desc {
            font-size: 13px;
            color: #888;
            display: block;
            margin-top: 2px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 15px;
            cursor: pointer;
            padding: 5px 0;
            margin-bottom: 15px;
            text-align: left;
            display: block;
        }

        .back-btn:active {
            opacity: 0.6;
        }

        .question-screen {
            display: none;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .question-number {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .question-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #666;
        }

        /* 문제 이미지 영역 */
        .question-image-container {
            margin-bottom: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }

        .question-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        .question-image.loading {
            min-height: 400px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 숫자 버튼 영역 */
        .number-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .number-btn {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .number-btn:hover:not(.disabled) {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .number-btn.selected {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
        }

        .number-btn.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #4caf50;
        }

        .number-btn.wrong {
            border-color: #f44336;
            background: #ffebee;
            color: #f44336;
        }

        .number-btn.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .explanation-box {
            margin-top: 25px;
            padding: 20px;
            background: #f0f8ff;
            border-radius: 10px;
            border-left: 4px solid #4caf50;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .explanation-box.show {
            display: block;
        }

        .explanation-title {
            font-weight: bold;
            color: #4caf50;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .explanation-text {
            color: #333;
            line-height: 1.8;
        }

        .explanation-text ul,
        .chat-bubble ul {
            margin: 6px 0 6px 18px;
            padding: 0;
        }

        .explanation-text li,
        .chat-bubble li {
            margin-bottom: 3px;
        }

        .explanation-text strong,
        .chat-bubble strong {
            color: #2c3e50;
        }

        .explanation-text .katex-display,
        .chat-bubble .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            padding: 4px 0;
            margin: 4px 0;
        }

        .explanation-loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
            font-size: 14px;
        }

        .explanation-loading .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #ddd;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .retry-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .retry-btn:active {
            opacity: 0.7;
        }

        .chat-history {
            margin-top: 12px;
        }

        .chat-bubble {
            padding: 10px 14px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 14px;
            line-height: 1.6;
        }

        .chat-bubble.user {
            background: #667eea;
            color: white;
            margin-left: 40px;
            text-align: right;
        }

        .chat-bubble.ai {
            background: #e8f5e9;
            color: #333;
            margin-right: 40px;
        }

        .followup-box {
            margin-top: 12px;
        }

        .followup-input-wrap {
            display: flex;
            gap: 8px;
        }

        .followup-input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }

        .followup-input:focus {
            border-color: #667eea;
        }

        .followup-btn {
            padding: 10px 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .followup-btn:active {
            opacity: 0.7;
        }

        .followup-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            gap: 10px;
        }

        .nav-left, .nav-right {
            display: flex;
            gap: 10px;
        }

        .btn-nav {
            padding: 14px 26px;
            font-size: 16px;
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            box-shadow: 0 5px 15px rgba(149, 165, 166, 0.4);
        }

        .btn-home {
            background: #3498db;
        }

        .btn-home:hover {
            background: #2980b9;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-finish {
            background: #e74c3c;
        }

        .btn-finish:hover {
            background: #c0392b;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .score-display {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
        }

        .score-label {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .score-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .score-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .score-item-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .score-item-value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .wrong-answers {
            margin-top: 40px;
            text-align: left;
        }

        .wrong-answers h3 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .wrong-answer-item {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }

        .wrong-answer-header {
            font-weight: bold;
            color: #856404;
            margin-bottom: 10px;
        }

        .wrong-answer-explanation {
            color: #333;
            line-height: 1.6;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ffeaa7;
        }

        .explanation-label {
            font-weight: bold;
            color: #4caf50;
            margin-bottom: 5px;
        }

        .image-error {
            text-align: center;
            padding: 40px;
            color: #f44336;
            background: #ffebee;
            border-radius: 10px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                min-height: 100vh;
            }

            .content {
                padding: 20px;
            }

            .score-details {
                grid-template-columns: 1fr;
            }

            .score-display {
                font-size: 48px;
            }

            .navigation {
                flex-direction: column;
            }

            .nav-left, .nav-right {
                width: 100%;
            }

            .btn-nav {
                flex: 1;
            }

            .number-buttons {
                grid-template-columns: repeat(5, 1fr);
                gap: 10px;
            }

            .number-btn {
                padding: 15px 10px;
                font-size: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 공인중개사 시험 문제집</h1>
            <p id="headerSubtitle">공인중개사 시험 대비</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="content">
            <!-- 메인 메뉴 -->
            <div class="start-screen" id="mainMenu">
                <h2>공인중개사 시험 대비 문제집</h2>
                <p>
                    학습 유형을 선택해주세요.
                </p>

                <div class="menu-buttons">
                    <button class="menu-btn" onclick="selectMode('past')">
                        <span class="menu-icon">📝</span>
                        <span class="menu-label">기출 문제집</span>
                        <span class="menu-desc">연도별 실제 기출문제</span>
                    </button>
                    <button class="menu-btn" onclick="selectMode('mock')">
                        <span class="menu-icon">🎯</span>
                        <span class="menu-label">모의고사</span>
                        <span class="menu-desc">실전 모의고사</span>
                    </button>
                    <button class="menu-btn" onclick="selectMode('practice')">
                        <span class="menu-icon">📚</span>
                        <span class="menu-label">일반 문제집</span>
                        <span class="menu-desc">주제별 연습문제</span>
                    </button>
                    <button class="menu-btn" onclick="selectMode('all')">
                        <span class="menu-icon">🔥</span>
                        <span class="menu-label">ALL</span>
                        <span class="menu-desc">모든 문제 통합</span>
                    </button>
                    <button class="menu-btn" onclick="showSettings()" style="border-color: #ddd;">
                        <span class="menu-icon">⚙️</span>
                        <span class="menu-label">API 키 설정</span>
                        <span class="menu-desc" id="apiKeyStatus">AI 해설 기능을 위한 API 키 관리</span>
                    </button>
                </div>
            </div>

            <!-- API 키 설정 화면 -->
            <div class="start-screen" id="settingsScreen" style="display:none;">
                <button class="back-btn" onclick="closeSettings()">← 메뉴로 돌아가기</button>
                <h2>⚙️ API 키 설정</h2>
                <p>AI 해설 기능을 사용하려면 최소 1개의 API 키가 필요합니다.<br>키는 이 기기에만 저장됩니다.</p>

                <div class="select-group">
                    <label>🔵 Gemini API 키 <a href="https://aistudio.google.com/apikey" target="_blank" style="font-size:12px; color:#667eea;">(발급받기)</a></label>
                    <input type="password" id="keyGemini" placeholder="AIzaSy..." style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px; font-size:14px;">
                </div>

                <div class="select-group">
                    <label>🟢 Groq API 키 <a href="https://console.groq.com/keys" target="_blank" style="font-size:12px; color:#667eea;">(발급받기)</a></label>
                    <input type="password" id="keyGroq" placeholder="gsk_..." style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px; font-size:14px;">
                </div>

                <div class="select-group">
                    <label>🟡 OpenRouter API 키 <a href="https://openrouter.ai/keys" target="_blank" style="font-size:12px; color:#667eea;">(발급받기)</a></label>
                    <input type="password" id="keyOpenrouter" placeholder="sk-or-..." style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px; font-size:14px;">
                </div>

                <button class="btn" onclick="saveApiKeys()" style="margin-top:15px;">💾 저장</button>
                <button class="btn" onclick="clearApiKeys()" style="margin-top:10px; background: linear-gradient(135deg, #f44336, #e91e63);">🗑️ 전체 삭제</button>
            </div>

            <!-- 시작 화면 (모드별 설정) -->
            <div class="start-screen" id="startScreen" style="display:none;">
                <button class="back-btn" onclick="goMainMenu()">← 메뉴로 돌아가기</button>
                <h2 id="startTitle">기출 문제집</h2>
                <p id="startDesc">기출문제를 바탕으로 만들어진 문제집입니다.</p>

                <div class="select-group" id="yearSelectGroup">
                    <label for="yearSelect" id="yearLabel">📅 년도 선택:</label>
                    <select id="yearSelect">
                        <option value="all">전체 년도</option>
                        <option value="2025">2025년 (제36회)</option>
                        <option value="2024">2024년 (제35회)</option>
                        <option value="2023">2023년 (제34회)</option>
                        <option value="2022">2022년 (제33회)</option>
                        <option value="2021">2021년 (제32회)</option>
                        <option value="2020">2020년 (제31회)</option>
                        <option value="random">🎲 랜덤 (맞춤형)</option>
                    </select>
                </div>

                <div class="select-group" id="questionCountInput">
                    <label for="questionCount">문항 수 입력:</label>
                    <input type="number" id="questionCount" min="5" max="200" value="40" placeholder="예: 40">
                </div>

                <div class="select-group">
                    <label for="subjectSelect">📚 과목 선택:</label>
                    <select id="subjectSelect">
                        <option value="all">전체 과목 (통합)</option>
                        <option value="intro">부동산학개론</option>
                        <option value="civil">민법 및 민사특별법</option>
                        <option value="broker">공인중개사법</option>
                        <option value="public">부동산공법</option>
                        <option value="disclosure">부동산공시법 및 세법</option>
                    </select>
                </div>

                <button class="btn" onclick="startQuiz()">시험 시작 🚀</button>
            </div>

            <!-- 문제 화면 -->
            <div class="question-screen" id="questionScreen">
                <div class="question-header">
                    <div class="question-number" id="questionNumber">문제 1/40</div>
                    <div class="question-stats">
                        <span>⏱️ <span id="timer">00:00</span></span>
                        <span id="yearBadge" style="background: #667eea; color: white; padding: 4px 10px; border-radius: 12px; font-size: 13px;"></span>
                        <span id="subjectBadge" style="background: #4caf50; color: white; padding: 4px 10px; border-radius: 12px; font-size: 13px;"></span>
                    </div>
                </div>

                <!-- 문제 이미지 -->
                <div class="question-image-container">
                    <img id="questionImage" class="question-image" alt="문제" />
                </div>

                <!-- 숫자 버튼 (1-5) -->
                <div class="number-buttons" id="numberButtons">
                    <button class="number-btn" onclick="selectAnswer(0)">1</button>
                    <button class="number-btn" onclick="selectAnswer(1)">2</button>
                    <button class="number-btn" onclick="selectAnswer(2)">3</button>
                    <button class="number-btn" onclick="selectAnswer(3)">4</button>
                    <button class="number-btn" onclick="selectAnswer(4)">5</button>
                </div>

                <!-- 해설 -->
                <div class="explanation-box" id="explanationBox">
                    <div class="explanation-title">💡 해설</div>
                    <div class="explanation-text" id="explanationText"></div>
                    <div class="chat-history" id="chatHistory"></div>
                    <div class="followup-box" id="followupBox" style="display:none;">
                        <div class="followup-input-wrap">
                            <input type="text" id="followupInput" class="followup-input" placeholder="추가 질문을 입력하세요..." />
                            <button class="followup-btn" onclick="sendFollowup()">전송</button>
                        </div>
                    </div>
                </div>

                <!-- 네비게이션 -->
                <div class="navigation">
                    <div class="nav-left">
                        <button class="btn btn-secondary btn-nav" onclick="previousQuestion()" id="prevBtn">◀ 이전</button>
                        <button class="btn btn-nav" onclick="nextQuestion()" id="nextBtn">다음 ▶</button>
                    </div>
                    <div class="nav-right">

            document.getElementById('keyGroq').value = '';

        function updateApiKeyStatus() {
            const count = [AI_KEYS.gemini, AI_KEYS.groq, AI_KEYS.openrouter].filter(k => k).length;
            const el = document.getElementById('apiKeyStatus');
            if (count > 0) {
                el.textContent = `✅ ${count}개 키 등록됨`;
                el.style.color = '#4caf50';

                el.textContent = '⚠️ API 키를 등록해주세요';
                el.style.color = '#f44336';
            }
        }

        });

        // 외부 텍스트 파일에서 해설 로드
        async function loadExplanations() {
            try {
                const res = await fetch('./explanations.txt?' + Date.now());
                if (!res.ok) return;
                const text = await res.text();
                const blocks = text.split(/===(.+?)===/);
                // blocks: ['', 'questions/xxx.png', '해설내용', 'questions/yyy.png', '해설내용', ...]
                const data = {};
                for (let i = 1; i < blocks.length; i += 2) {
                    const key = blocks[i].trim();
                    const value = (blocks[i + 1] || '').trim();
                    if (key && value) data[key] = value;
                }
                const allDBs = [questionDatabase, mockDatabase, practiceDatabase];
                allDBs.forEach(db => {
                    db.forEach(q => {
                        if (data[q.image]) {
                            q.explanation = data[q.image];
                        }
                    });
                });
                console.log('✅ 해설 로드 완료:', Object.keys(data).length, '개');
            } catch (e) {
                console.log('해설 파일 없음 (정상)');
            }
        }

        function startQuiz() {
            const selectedYear = document.getElementById('yearSelect').value;
            const selectedSubject = document.getElementById('subjectSelect').value;
            const questionCount = parseInt(document.getElementById('questionCount').value) || 40;

            // 모드별 문제 DB 선택
            let sourceDB;
            if (currentMode === 'past') {
                sourceDB = [...questionDatabase];
            } else if (currentMode === 'mock') {
                sourceDB = [...mockDatabase];
            } else if (currentMode === 'practice') {
                sourceDB = [...practiceDatabase];
            } else {
                // ALL: 모든 DB 합침
                sourceDB = [...questionDatabase, ...mockDatabase, ...practiceDatabase];
            }

            let filteredQuestions = sourceDB;
            
            if (selectedYear !== 'all' && selectedYear !== 'random') {
                // ALL 모드: past_2025, mock_1 등 접두사 처리
                if (selectedYear.startsWith('past_')) {
                    const year = selectedYear.replace('past_', '');
                    filteredQuestions = questionDatabase.filter(q => q.year == year);
                } else if (selectedYear.startsWith('mock_')) {
                    const year = selectedYear.replace('mock_', '');
                    filteredQuestions = mockDatabase.filter(q => q.year == year);
                } else if (selectedYear.startsWith('practice_')) {
                    const year = selectedYear.replace('practice_', '');
                    filteredQuestions = practiceDatabase.filter(q => q.year == year);
                } else {
                    filteredQuestions = filteredQuestions.filter(q => q.year == selectedYear);
                }
            }

            if (selectedSubject !== 'all') {
                filteredQuestions = filteredQuestions.filter(q => q.subject === selectedSubject);
            }

            if (selectedYear === 'random') {
                filteredQuestions.sort(() => Math.random() - 0.5);
                filteredQuestions = filteredQuestions.slice(0, questionCount);
            } else {
                filteredQuestions.sort(() => Math.random() - 0.5);
            }

            if (filteredQuestions.length === 0) {
                alert('선택한 조건에 해당하는 문제가 없습니다.');
                return;
            }

            currentQuestions = filteredQuestions;
            currentQuestionIndex = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            questionAnswered = new Array(currentQuestions.length).fill(false);
            startTime = Date.now();

            if (selectedYear === 'random') {
                document.getElementById('headerSubtitle').textContent = `랜덤 모드 (${currentQuestions.length}문제)`;

                document.getElementById('headerSubtitle').textContent = '2020-2025년 통합';
            } else {
                document.getElementById('headerSubtitle').textContent = `${selectedYear}년 기출`;
            }

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('questionScreen').style.display = 'block';
            
            startTimer();
            displayQuestion();
        }

        // ====== AI 해설 시스템 ======
        const AI_KEYS = {
            get gemini() { return localStorage.getItem('ai_key_gemini') || ''; },
            get groq() { return localStorage.getItem('ai_key_groq') || ''; },
            get openrouter() { return localStorage.getItem('ai_key_openrouter') || ''; }
        };

        function hasAnyApiKey() {
            return AI_KEYS.gemini || AI_KEYS.groq || AI_KEYS.openrouter;
        }

        const explanationCache = {};

        // 대화 히스토리 (문제별)
        const chatHistories = {};
        // 해설 생성에 성공한 모델 (문제별)
        const usedModels = {};

        // 마크다운 → HTML 변환
        function mdToHtml(text) {
            if (!text) return '';

            // 1단계: 수식을 먼저 보호 (placeholder로 치환)
            const mathBlocks = [];
            let processed = text;

            if (typeof katex !== 'undefined') {
                // 블록 수식: $$ ... $$
                processed = processed.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
                    try {
                        const rendered = katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false });
                        mathBlocks.push(rendered);
                        return `%%MATH${mathBlocks.length - 1}%%`;
                    } catch (e) { return tex; }
                });
                // 블록 수식: \[ ... \]
                processed = processed.replace(/\\\[([\s\S]*?)\\\]/g, (_, tex) => {
                    try {
                        const rendered = katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false });
                        mathBlocks.push(rendered);
                        return `%%MATH${mathBlocks.length - 1}%%`;
                    } catch (e) { return tex; }
                });
                // 인라인 수식: \( ... \)
                processed = processed.replace(/\\\(([\s\S]*?)\\\)/g, (_, tex) => {
                    try {
                        const rendered = katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false });
                        mathBlocks.push(rendered);
                        return `%%MATH${mathBlocks.length - 1}%%`;
                    } catch (e) { return tex; }
                });
                // 인라인 수식: $ ... $ (한 줄 내)
                processed = processed.replace(/(?<!\$)\$(?!\$)([^\$\n]+?)\$(?!\$)/g, (_, tex) => {
                    try {
                        const rendered = katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false });
                        mathBlocks.push(rendered);
                        return `%%MATH${mathBlocks.length - 1}%%`;
                    } catch (e) { return tex; }
                });
            }

            // 2단계: HTML 이스케이프 + 마크다운 변환
            let html = processed
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/^###\s+(.+)$/gm, '<strong>$1</strong>')
                .replace(/^##\s+(.+)$/gm, '<strong>$1</strong>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
                .replace(/^\s*\d+\.\s+(.+)$/gm, '<li>$1</li>')
                .replace(/((<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>')
                .replace(/\n/g, '<br>')
                .replace(/(<br>\s*){2,}/g, '<br>')
                .replace(/<br>\s*<ul>/g, '<ul>')
                .replace(/<\/ul>\s*<br>/g, '</ul>');

            // 3단계: 수식 placeholder 복원
            html = html.replace(/%%MATH(\d+)%%/g, (_, idx) => mathBlocks[parseInt(idx)]);

            return html;
        }

        // 이미지 → base64
        function imageToBase64(imgEl) {
            const canvas = document.createElement('canvas');
            canvas.width = imgEl.naturalWidth;
            canvas.height = imgEl.naturalHeight;
            canvas.getContext('2d').drawImage(imgEl, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
        }

        // 해설 프롬프트
        function buildPrompt(ocrText, correctNum) {
            return `다음은 공인중개사 시험 문제이고, 정답은 ${correctNum}번이야.

${ocrText}

다음 규칙대로 해설을 작성해:
- 200자 이내로 간결하게 (살짝 넘으면 문장 마무리)
- 왜 정답이 그것인지, 주요 오답은 왜 틀린지 설명
- 문제 내용을 그대로 반복하지 말기
- 모든 단어는 한국어로만 작성
- 반말로 짧고 간결하게

해설:`;
        }

        // 방법1: Gemini Vision (이미지 직접 전송 → OCR+해설 한번에)
        async function tryGeminiVision(base64, correctNum) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${AI_KEYS.gemini}`;
            const prompt = `이 공인중개사 시험 문제 이미지를 보고 해설을 작성해줘. 정답은 ${correctNum}번이야.

규칙:
- 200자 이내, 반말, 간결하게
- 왜 정답이 그것인지, 주요 오답은 왜 틀린지
- 문제 내용 반복 금지
- 한국어로만 작성

해설:`;

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { inlineData: { mimeType: 'image/jpeg', data: base64 } },
                            { text: prompt }
                        ]
                    }],
                    generationConfig: { maxOutputTokens: 400 }
                })
            });

            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`Gemini Vision ${res.status}: ${errText.substring(0, 100)}`);
            }
            const data = await res.json();
            if (!data.candidates || !data.candidates[0]) throw new Error('Gemini 응답 없음');
            return data.candidates[0].content.parts[0].text.trim();
        }

        // 방법2: Gemini OCR만 (텍스트 추출용)
        async function geminiOCR(base64) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${AI_KEYS.gemini}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { inlineData: { mimeType: 'image/jpeg', data: base64 } },
                            { text: '이 시험 문제 이미지의 텍스트를 그대로 추출해. 문제번호, 보기, 선택지 모두 포함. 설명 없이 텍스트만.' }
                        ]
                    }],
                    generationConfig: { maxOutputTokens: 800 }
                })
            });
            if (!res.ok) throw new Error(`OCR 실패 ${res.status}`);
            const data = await res.json();
            if (!data.candidates || !data.candidates[0]) throw new Error('OCR 응답 없음');
            return data.candidates[0].content.parts[0].text.trim();
        }

        // Groq Vision 호출 (이미지 직접 전송)
        async function callGroqVision(base64, correctNum) {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${AI_KEYS.groq}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'meta-llama/llama-4-scout-17b-16e-instruct',
                    messages: [{
                        role: 'user',
                        content: [
                            {
                                type: 'image_url',
                                image_url: { url: `data:image/jpeg;base64,${base64}` }
                            },
                            {
                                type: 'text',
                                text: `이 공인중개사 시험 문제를 보고 해설을 작성해줘. 정답은 ${correctNum}번이야.

규칙:
- 200자 이내, 반말, 간결하게
- 왜 정답이 그것인지, 주요 오답은 왜 틀린지
- 문제 내용 반복 금지
- 한국어로만 작성

해설:`
                            }
                        ]
                    }],
                    max_tokens: 400
                })
            });
            if (!res.ok) throw new Error(`Groq Vision ${res.status}`);
            const data = await res.json();
            return data.choices[0].message.content.trim();
        }

        // Groq 텍스트 호출 (OCR 텍스트 기반)
        async function callGroq(prompt) {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${AI_KEYS.groq}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'llama-3.1-8b-instant',
                    messages: [{ role: 'user', content: prompt }],
                    max_tokens: 400
                })
            });
            if (!res.ok) throw new Error(`Groq ${res.status}`);
            const data = await res.json();
            return data.choices[0].message.content.trim();
        }

        // OpenRouter 호출
        async function callOpenRouter(prompt) {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${AI_KEYS.openrouter}`,

        // Gemini 텍스트 해설 (OCR 텍스트 기반)
        async function callGeminiText(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${AI_KEYS.gemini}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { maxOutputTokens: 400 }
                })
            });
            if (!res.ok) throw new Error(`Gemini Text ${res.status}`);
            const data = await res.json();
            if (!data.candidates || !data.candidates[0]) throw new Error('Gemini Text 응답 없음');
            return data.candidates[0].content.parts[0].text.trim();
        }

        // 메인 해설 생성 (멀티 모델 폴백)
        async function getAIExplanation(question) {
            const cacheKey = question.image;
            if (explanationCache[cacheKey]) return explanationCache[cacheKey];

            const img = document.getElementById('questionImage');
            if (!img || !img.complete || !img.naturalWidth) {
                throw new Error('이미지 로드 안됨');
            }

            const base64 = imageToBase64(img);
            const correctNum = question.correct + 1;
            let ocrText = null;

            // 성공 시 공통 처리
            function onSuccess(result, modelName) {
                console.log(`✅ ${modelName} 성공`);
                usedModels[cacheKey] = modelName;
                chatHistories[cacheKey] = [{ role: 'assistant', content: result }];
                explanationCache[cacheKey] = result;
                question.explanation = result;
            }

            // 1차: Gemini Vision
            try {
                console.log('1차: Gemini Vision 시도...');
                const result = await tryGeminiVision(base64, correctNum);
                if (result && result.length > 10) {
                    onSuccess(result, 'geminiVision');
                    return result;
                }
            } catch (e) {
                console.warn('❌ Gemini Vision 실패:', e.message);
            }

            // 2차: Groq Vision
            try {
                console.log('2차: Groq Vision 시도...');
                const result = await callGroqVision(base64, correctNum);
                if (result && result.length > 10) {
                    onSuccess(result, 'groqVision');
                    return result;
                }
            } catch (e) {
                console.warn('❌ Groq Vision 실패:', e.message);
            }

            // 3차: OCR 추출 → 텍스트 기반 모델들
            try {
                console.log('OCR 추출 시도...');
                ocrText = await geminiOCR(base64);
                console.log('OCR 성공, 길이:', ocrText.length);
            } catch (e) {
                console.warn('❌ OCR 실패:', e.message);
                ocrText = null;
            }

            if (ocrText && ocrText.length >= 20) {
                const prompt = buildPrompt(ocrText, correctNum);

                // 4차: Gemini 텍스트
                try {
                    console.log('4차: Gemini Text 시도...');
                    const result = await callGeminiText(prompt);
                    if (result && result.length > 10) {
                        onSuccess(result, 'geminiText');
                        return result;
                    }
                } catch (e) {
                    console.warn('❌ Gemini Text 실패:', e.message);
                }

                // 5차: Groq 텍스트
                try {
                    console.log('5차: Groq Text 시도...');
                    const result = await callGroq(prompt);
                    if (result && result.length > 10) {
                        onSuccess(result, 'groqText');
                        return result;
                    }
                } catch (e) {
                    console.warn('❌ Groq Text 실패:', e.message);
                }

                // 6차: OpenRouter
                try {
                    console.log('6차: OpenRouter 시도...');
                    const result = await callOpenRouter(prompt);
                    if (result && result.length > 10) {
                        onSuccess(result, 'openrouter');
                        return result;
                    }
                } catch (e) {
                    console.warn('❌ OpenRouter 실패:', e.message);
                }
            }

            throw new Error('모든 모델 실패');
        }

        // 추가 질문 전송
        async function sendFollowup() {
            const input = document.getElementById('followupInput');
            const userMsg = input.value.trim();
            if (!userMsg) return;

            if (!hasAnyApiKey()) {
                alert('API 키가 설정되지 않았습니다. 설정에서 키를 등록해주세요.');
                return;
            }

            const question = currentQuestions[currentQuestionIndex];
            const cacheKey = question.image;
            let modelName = usedModels[cacheKey];

            // 수동 해설인 경우 (AI 호출 없었던 경우) → 사용 가능한 모델 자동 선택
            if (!modelName) {
                if (AI_KEYS.groq) modelName = 'groqVision';
                else if (AI_KEYS.openrouter) modelName = 'openrouter';
                else if (AI_KEYS.gemini) modelName = 'geminiVision';
                else return;

                usedModels[cacheKey] = modelName;
                chatHistories[cacheKey] = [{ role: 'assistant', content: question.explanation || '' }];
            }
            
            // 사용자 메시지 표시
            const chatHistory = document.getElementById('chatHistory');
            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble user';
            userBubble.textContent = userMsg;
            chatHistory.appendChild(userBubble);

            // 입력 초기화 & 비활성화
            input.value = '';
            input.disabled = true;
            document.querySelector('.followup-btn').disabled = true;

            // 로딩 표시
            const loadingBubble = document.createElement('div');
            loadingBubble.className = 'chat-bubble ai';
            loadingBubble.innerHTML = '<div class="explanation-loading"><div class="spinner"></div>답변 생성 중...</div>';
            chatHistory.appendChild(loadingBubble);

            // 히스토리에 추가
            if (!chatHistories[cacheKey]) chatHistories[cacheKey] = [];
            chatHistories[cacheKey].push({ role: 'user', content: userMsg });

            try {
                let aiReply;
                const history = chatHistories[cacheKey];
                const base64 = imageToBase64(document.getElementById('questionImage'));

                if (modelName === 'geminiVision' || modelName === 'geminiText') {
                    // Gemini: 대화 히스토리 포함 호출
                    const contents = [];
                    // 첫 메시지에 이미지 포함
                    contents.push({
                        role: 'user',
                        parts: [
                            { inlineData: { mimeType: 'image/jpeg', data: base64 } },
                            { text: '이 공인중개사 시험 문제에 대해 질문할게.' }
                        ]
                    });
                    history.forEach(msg => {
                        contents.push({
                            role: msg.role === 'assistant' ? 'model' : 'user',
                            parts: [{ text: msg.content }]
                        });
                    });

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${AI_KEYS.gemini}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, generationConfig: { maxOutputTokens: 500 } })
                    });
                    if (!res.ok) throw new Error(`Gemini ${res.status}`);
                    const data = await res.json();
                    aiReply = data.candidates[0].content.parts[0].text.trim();

                } else if (modelName === 'groqVision' || modelName === 'groqText') {
                    // Groq: 대화 히스토리 포함 호출
                    const messages = [];
                    // 첫 메시지에 이미지 포함
                    messages.push({
                        role: 'user',
                        content: [
                            { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64}` } },
                            { type: 'text', text: '이 공인중개사 시험 문제에 대해 질문할게.' }
                        ]
                    });
                    history.forEach(msg => {
                        messages.push({ role: msg.role, content: msg.content });
                    });

                    const model = modelName === 'groqVision' ? 'meta-llama/llama-4-scout-17b-16e-instruct' : 'llama-3.1-8b-instant';
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${AI_KEYS.groq}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ model, messages, max_tokens: 500 })
                    });
                    if (!res.ok) throw new Error(`Groq ${res.status}`);
                    const data = await res.json();
                    aiReply = data.choices[0].message.content.trim();

                } else {
                    // OpenRouter
                    const messages = [];
                    history.forEach(msg => {
                        messages.push({ role: msg.role, content: msg.content });
                    });

                    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${AI_KEYS.openrouter}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'mistralai/mixtral-8x7b-instruct',
                            messages,
                            max_tokens: 500
                        })
                    });
                    if (!res.ok) throw new Error(`OpenRouter ${res.status}`);
                    const data = await res.json();
                    aiReply = data.choices[0].message.content.trim();
                }

                // 응답 표시
                loadingBubble.innerHTML = '';
                loadingBubble.innerHTML = mdToHtml(aiReply);
                chatHistories[cacheKey].push({ role: 'assistant', content: aiReply });

            } catch (e) {
                console.error('추가 질문 실패:', e);
                loadingBubble.innerHTML = '<span style="color:#f44336;">답변 생성에 실패했습니다.</span>';
            }

            // 입력 다시 활성화
            input.disabled = false;
            document.querySelector('.followup-btn').disabled = false;
            input.focus();

            // 스크롤
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // 추가 질문 UI 표시
        function showFollowupUI() {
            document.getElementById('followupBox').style.display = 'block';
            // Enter 키로 전송
            const input = document.getElementById('followupInput');
            input.onkeydown = (e) => {
                if (e.key === 'Enter') sendFollowup();
            };
        }

        // retry 핸들러
        function retryExplanation() {
            const question = currentQuestions[currentQuestionIndex];
            const explanationText = document.getElementById('explanationText');
            explanationText.innerHTML = '<div class="explanation-loading"><div class="spinner"></div>AI 해설 재시도 중...</div>';

            getAIExplanation(question).then((text) => {
                explanationText.innerHTML = mdToHtml(text);
                showFollowupUI();
            }).catch((err) => {
                console.error('AI 해설 재시도 실패:', err);
                explanationText.innerHTML = '<span style="color:#f44336;">해설을 불러오지 못했습니다.</span><br><button class="retry-btn" onclick="retryExplanation()">🔄 다시 시도</button>';
            });
        }

        function selectAnswer(answerIndex) {
            if (questionAnswered[currentQuestionIndex]) {
                return;
            }

            const question = currentQuestions[currentQuestionIndex];
            userAnswers[currentQuestionIndex] = answerIndex;
            questionAnswered[currentQuestionIndex] = true;

            // 즉시 정답/오답 표시
            const buttons = document.querySelectorAll('.number-btn');
            buttons.forEach((btn, index) => {
                btn.classList.add('disabled');
                if (index === question.correct) {
                    btn.classList.add('correct');
                } else if (index === answerIndex) {
                    btn.classList.add('wrong');
                }
            });

            // 해설 표시
            const explanationBox = document.getElementById('explanationBox');
            const explanationText = document.getElementById('explanationText');
            explanationBox.classList.add('show');

            // 기존 해설이 있으면 바로 표시, 없으면 AI 생성
            if (question.explanation && question.explanation.trim() !== '') {
                explanationText.innerHTML = mdToHtml(question.explanation);
                showFollowupUI();
            } else {
                explanationText.innerHTML = '<div class="explanation-loading"><div class="spinner"></div>AI 해설 생성 중...</div>';

                getAIExplanation(question).then((text) => {
                    explanationText.innerHTML = mdToHtml(text);
                    showFollowupUI();
                }).catch((err) => {
                    console.error('AI 해설 실패:', err);
                    explanationText.innerHTML = '<span style="color:#f44336;">해설을 불러오지 못했습니다.</span><br><button class="retry-btn" onclick="retryExplanation()">🔄 다시 시도</button>';
                });
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function goHome() {
            if (confirm('정말 홈으로 돌아가시겠습니까?\n현재까지의 진행 상황은 저장되지 않습니다.')) {
                clearInterval(timerInterval);
                resetQuiz();
            }
        }

        function finishEarly() {
            if (confirm('시험을 종료하고 결과를 확인하시겠습니까?\n답하지 않은 문제는 오답으로 처리됩니다.')) {
                for (let i = 0; i < currentQuestions.length; i++) {
                    if (userAnswers[i] === null) {
                        userAnswers[i] = -1;
                    }
                }
                showResults();
            }
        }

        function showResults() {
            clearInterval(timerInterval);

            let correctCount = 0;
            let wrongQuestions = [];

            userAnswers.forEach((answer, index) => {
                if (answer === currentQuestions[index].correct) {
                    correctCount++;
                } else {
                    wrongQuestions.push({
                        questionNum: index + 1,
                        question: currentQuestions[index],
                        userAnswer: answer
                    });
                }
            });

            const score = Math.round((correctCount / currentQuestions.length) * 100);

            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            document.getElementById('finalScore').textContent = score + '점';
            document.getElementById('totalQuestions').textContent = currentQuestions.length;
            document.getElementById('correctAnswers').textContent = correctCount;
            document.getElementById('wrongAnswers').textContent = wrongQuestions.length;

            const wrongAnswersList = document.getElementById('wrongAnswersList');
            wrongAnswersList.innerHTML = '';

            if (wrongQuestions.length === 0) {
                wrongAnswersList.innerHTML = '<p style="text-align: center; color: #4caf50; font-size: 18px; padding: 40px;">🎉 모든 문제를 맞혔습니다! 완벽합니다!</p>';
            } else {
                wrongQuestions.forEach(wrong => {
                    const wrongDiv = document.createElement('div');
                    wrongDiv.className = 'wrong-answer-item';
                    
                    const userAnswerText = wrong.userAnswer !== null && wrong.userAnswer !== -1
                        ? `${wrong.userAnswer + 1}번` 
                        : '(답안 미선택)';
                    
                    wrongDiv.innerHTML = `
                        <div class="wrong-answer-header">
                            [${wrong.question.year}년] 문제 ${wrong.questionNum}
                        </div>
                        <div style="margin-top: 10px;">
                            <div style="color: #f44336; margin-bottom: 5px;">
                                ❌ 선택한 답: ${userAnswerText}
                            </div>
                            <div style="color: #4caf50; margin-bottom: 5px;">
                                ✅ 정답: ${wrong.question.correct + 1}번
                            </div>
                        </div>
                        <div class="wrong-answer-explanation">
                            <div class="explanation-label">💡 해설:</div>
                            ${explanationCache[wrong.question.image] || wrong.question.explanation || '해설 없음'}
                        </div>
                    `;
                    wrongAnswersList.appendChild(wrongDiv);
                });
            }
        }

        function resetQuiz() {
            currentQuestionIndex = 0;
            userAnswers = [];
            questionAnswered = [];
            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('settingsScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('headerSubtitle').textContent = '공인중개사 시험 대비';
            updateApiKeyStatus();
        }

        function restartQuiz() {
            resetQuiz();
        }
    </script>
</body>
</html>
